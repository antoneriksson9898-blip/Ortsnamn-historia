<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ortnamnskollen</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f7fa;
    max-width:800px;
    margin:auto;
    padding:20px;
}

h1{
    text-align:center;
    color:#2c3e50;
}

p{
    text-align:center;
}

.search-box{
    display:flex;
    gap:10px;
    margin-top:30px;
}

input{
    flex:1;
    padding:15px;
    border-radius:10px;
    border:1px solid #ccc;
    font-size:16px;
}

button{
    padding:15px 25px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
}

#resultat{
    margin-top:30px;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<h1>Ortnamnskollen</h1>

<p>Upptäck historien bakom Sveriges ortnamn</p>

<div class="search-box">
    <input type="text" id="ortnamn" placeholder="Skriv ett ortnamn" onkeypress="if(event.key==='Enter') sok()">
    <button onclick="sok()">Sök</button>
</div>

<div id="resultat"></div>

    <script>
    
async function sok() {

alert("Knappen fungerar");
    
    let ort = document.getElementById("ortnamn").value;

    document.getElementById("resultat").innerHTML =
        "<p>Söker information om ortnamnet...</p>";

    try {

        const response = await fetch(
            "https://ortsnamn-ai.anton-eriksson9898.workers.dev/",
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    ortnamn: ort
                })
            }
        );

        const data = await response.json();

        document.getElementById("resultat").innerHTML = `
            <h2>${ort}</h2>
            <p>${data.svar}</p>
        `;

    } catch (error) {

        document.getElementById("resultat").innerHTML = `
            <p>Kunde inte hämta information.</p>
        `;

        console.error(error);
    }
}
}

}


</script>

</body>
</html>
